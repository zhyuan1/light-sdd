# delegates.yaml -- Centralized delegation registry for SDD skills
#
# Maps each SDD action to its primary delegate(s), fallback(s),
# and manual-mode message. Consumed by delegation-protocol.md.
#
# Structure per action:
#   primary:         list of {framework, skill} -- tried in order
#   fallback:        list of {framework, skill} -- tried if all primaries missing
#   manual_message:  string shown when no delegate is available
#   phases:          (optional) multi-phase actions with independent resolution
#   transition_suppression: (optional) override directives for delegate auto-transitions

sdd-brainstorm:
  primary:
    - framework: superpowers
      skill: brainstorming
  fallback:
    - framework: ecc
      skill: blueprint
  manual_message: >-
    No brainstorming skill available (Superpowers, ECC).
    Proceeding in manual mode -- SDD will guide you through
    the brainstorm template directly.
  transition_suppression:
    - delegate_skill: brainstorming
      suppress:
        - writing-plans
      override_text: >-
        SDD OVERRIDE: Do NOT invoke `writing-plans` or any other skill after
        brainstorming completes. Your scope is limited to producing `brainstorm.md`.
        Return control to SDD when the brainstorm document is finalized. SDD controls
        the workflow -- the next step is `/sdd-propose`, not `writing-plans`.

sdd-propose:
  primary:
    - framework: openspec
      skill: openspec-new-change
    - framework: openspec
      skill: openspec-continue-change
  fallback:
    - framework: ecc
      skill: blueprint
  manual_message: >-
    No proposal skill available (OpenSpec, ECC).
    Proceeding in manual mode -- SDD will guide you through
    the proposal template directly.

sdd-ff:
  primary:
    - framework: openspec
      skill: openspec-ff-change
  fallback:
    - framework: ecc
      skill: blueprint
  manual_message: >-
    No fast-forward skill available (OpenSpec, ECC).
    Proceeding in manual mode -- SDD will generate artifacts
    using templates and spec context directly.

sdd-plan:
  primary:
    - framework: superpowers
      skill: writing-plans
  fallback:
    - framework: ecc
      skill: blueprint
  manual_message: >-
    No planning skill available (Superpowers, ECC).
    Proceeding in manual mode -- SDD will generate the plan
    using spec context and task list directly.
  transition_suppression:
    - delegate_skill: writing-plans
      suppress:
        - subagent-driven-development
        - executing-plans
      override_text: >-
        SDD OVERRIDE: Do NOT invoke `subagent-driven-development`, `executing-plans`,
        or any other skill after plan generation. Do NOT present an execution handoff
        prompt. Your scope is limited to producing `plan.md`. Return control to SDD
        when the plan document is finalized. SDD controls the workflow -- the next
        step is `/sdd-code`, not an execution skill.

sdd-code:
  primary:
    - framework: superpowers
      skill: executing-plans
    - framework: superpowers
      skill: test-driven-development
    - framework: superpowers
      skill: systematic-debugging
  fallback:
    - framework: ecc
      skill: tdd-workflow
    - framework: ecc
      skill: search-first
  manual_message: >-
    No execution skills available (Superpowers, ECC).
    Proceeding with direct TDD coding -- SDD will enforce
    RED-GREEN-REFACTOR cycle directly.
  partial_availability: true
  transition_suppression:
    - delegate_skill: executing-plans
      suppress:
        - using-git-worktrees
        - finishing-a-development-branch
      override_text: >-
        SDD OVERRIDE: Do NOT invoke `using-git-worktrees` before starting.
        Do NOT invoke `finishing-a-development-branch` after tasks complete.
        Your scope is limited to executing the tasks in the current batch and
        updating their status. Return control to SDD when the batch is done.
        SDD controls workspace management and branch finishing -- these are
        handled by `/sdd-ship`.

sdd-review-code:
  phases:
    phase1:
      description: Spec compliance review (SDD self-logic)
      delegate: self
    phase2:
      primary:
        - framework: superpowers
          skill: requesting-code-review
      fallback:
        - framework: ecc
          skill: security-review
      manual_message: >-
        No code review skill available (Superpowers, ECC).
        Phase 1 (spec compliance) will run.
        Phase 2 (code quality) skipped -- consider manual code review.

sdd-verify:
  phases:
    step1:
      primary:
        - framework: openspec
          skill: openspec-verify-change
    step2:
      primary:
        - framework: superpowers
          skill: verification-before-completion
  fallback:
    - framework: ecc
      skill: verification-loop
  manual_message: >-
    No verification skills available (OpenSpec, Superpowers, ECC).
    SDD will verify acceptance criteria against test results
    and implementation directly.
  partial_availability: true

sdd-ship:
  phases:
    sync:
      primary:
        - framework: openspec
          skill: openspec-sync-specs
      inline_fallback: >-
        SDD performs a direct file copy from `.sdd/changes/<name>/specs/`
        to the project spec location.
    archive:
      primary:
        - framework: openspec
          skill: openspec-archive-change
      inline_fallback: >-
        SDD performs a direct directory move to `.sdd/changes/archive/`.
    finish:
      primary:
        - framework: superpowers
          skill: finishing-a-development-branch
      fallback:
        - framework: ecc
          skill: git-workflow
      manual_message: >-
        Superpowers `finishing-a-development-branch` not found.
        SDD will present git options (merge/PR/preserve/discard)
        and execute directly.

# ─────────────────────────────────────────────────────────────────────────────
# Profiles -- named override sets for alternative framework stacks.
#
# Each profile entry for an action REPLACES that action's primary/fallback/
# manual_message/transition_suppression keys. Actions absent from a profile
# inherit base (default) values unchanged.
#
# Active profile is stored in .sdd/config.yaml → active_profile.
# Switch profiles with /sdd-use <profile>. Default: no overrides.
#
# Design principle: a profile's fallback chain stays within that framework.
# When the user chooses a profile (e.g. /sdd-use gstack), cross-framework
# fallbacks (to superpowers/openspec/ecc) are intentionally absent -- if the
# chosen skill is not installed, SDD falls through to manual mode directly.
# Exception: sdd-ship sync/archive keep openspec because gstack has no
# spec-sync or archive equivalent (these are not fallbacks -- they are the
# correct primary tools for those phases regardless of profile).
#
# ai_native_kit profile notes:
#   sdd-brainstorm has no direct counterpart in ai_native_kit (that framework
#   starts from structured requirement analysis, not open-ended brainstorming).
#   ECC `think` is used as primary so the action remains functional.
#   sdd-ship sync/archive keep openspec (same reason as gstack profile).
# ─────────────────────────────────────────────────────────────────────────────

profiles:

  gstack:

    sdd-brainstorm:
      primary:
        - framework: gstack
          skill: office-hours
      manual_message: >-
        gstack `office-hours` not found.
        Proceeding in manual mode -- SDD will guide you through
        the brainstorm template directly.
      transition_suppression:
        - delegate_skill: office-hours
          suppress:
            - plan-ceo-review
            - autoplan
          override_text: >-
            SDD OVERRIDE: Do NOT invoke `plan-ceo-review`, `autoplan`, or any other skill
            after office-hours completes. Your scope is limited to producing `brainstorm.md`.
            Return control to SDD when the brainstorm document is finalized.
            SDD controls the workflow -- the next step is `/sdd-propose`, not a gstack planning skill.

    sdd-propose:
      primary:
        - framework: gstack
          skill: plan-ceo-review
      manual_message: >-
        gstack `plan-ceo-review` not found.
        Proceeding in manual mode -- SDD will guide you through
        the proposal template directly.

    sdd-ff:
      primary:
        - framework: gstack
          skill: plan-design-review
      manual_message: >-
        gstack `plan-design-review` not found.
        Proceeding in manual mode -- SDD will generate artifacts
        using templates and spec context directly.

    sdd-plan:
      primary:
        - framework: gstack
          skill: autoplan
      manual_message: >-
        gstack `autoplan` not found.
        Proceeding in manual mode -- SDD will generate the plan
        using spec context and task list directly.
      transition_suppression:
        - delegate_skill: autoplan
          suppress:
            - ship
            - review
            - qa
            - land-and-deploy
          override_text: >-
            SDD OVERRIDE: Do NOT invoke `ship`, `review`, `qa`, `land-and-deploy`,
            or any other skill after autoplan completes. Do NOT present an execution handoff.
            Your scope is limited to producing `plan.md`. Return control to SDD when
            the plan document is finalized. SDD controls the workflow -- the next step
            is `/sdd-code`, not a gstack execution skill.

    sdd-code:
      primary:
        - framework: gstack
          skill: design-html
        - framework: gstack
          skill: qa
      manual_message: >-
        gstack execution skills (`design-html`, `qa`) not found.
        Proceeding with direct TDD coding -- SDD will enforce
        RED-GREEN-REFACTOR cycle directly.
      partial_availability: true
      transition_suppression:
        - delegate_skill: design-html
          suppress:
            - ship
            - land-and-deploy
            - canary
          override_text: >-
            SDD OVERRIDE: Do NOT invoke `ship`, `land-and-deploy`, `canary`, or any
            deployment skill after design-html completes. Your scope is limited to
            producing production-ready code for the current task batch. Return control
            to SDD when the batch is done. SDD controls workspace management and
            deployment -- these are handled by `/sdd-ship`.

    sdd-review-spec:
      primary:
        - framework: gstack
          skill: plan-design-review
      manual_message: >-
        gstack `plan-design-review` not found.
        SDD will review specs directly against schema.yaml requirements.

    sdd-review-code:
      phases:
        phase1:
          description: Spec compliance review (SDD self-logic)
          delegate: self
        phase2:
          primary:
            - framework: gstack
              skill: review
            - framework: gstack
              skill: cso
          manual_message: >-
            gstack review skills (`review`, `cso`) not found.
            Phase 1 (spec compliance) will run.
            Phase 2 (code quality) skipped -- consider manual code review.

    sdd-verify:
      phases:
        step1:
          primary:
            - framework: gstack
              skill: qa
        step2:
          primary:
            - framework: gstack
              skill: benchmark
      manual_message: >-
        gstack verification skills (`qa`, `benchmark`) not found.
        SDD will verify acceptance criteria against test results
        and implementation directly.
      partial_availability: true

    sdd-ship:
      # sync and archive: openspec is the correct primary tool regardless of profile --
      # gstack has no spec-sync or archive equivalent.
      phases:
        sync:
          primary:
            - framework: openspec
              skill: openspec-sync-specs
          inline_fallback: >-
            SDD performs a direct file copy from `.sdd/changes/<name>/specs/`
            to the project spec location.
        archive:
          primary:
            - framework: openspec
              skill: openspec-archive-change
          inline_fallback: >-
            SDD performs a direct directory move to `.sdd/changes/archive/`.
        finish:
          primary:
            - framework: gstack
              skill: ship
          fallback:
            - framework: gstack
              skill: land-and-deploy
          manual_message: >-
            gstack ship skills (`ship`, `land-and-deploy`) not found.
            SDD will present git options (merge/PR/preserve/discard)
            and execute directly.

  ai_native_kit:

    # sdd-brainstorm: no direct counterpart in ai_native_kit (that framework
    # begins from structured requirement analysis, not open-ended ideation).
    # Superpowers `brainstorming` is used as primary so the action stays fully functional.
    sdd-brainstorm:
      primary:
        - framework: superpowers
          skill: brainstorming
      manual_message: >-
        Superpowers `brainstorming` not found.
        Proceeding in manual mode -- SDD will guide you through
        the brainstorm template directly.
      transition_suppression:
        - delegate_skill: brainstorming
          suppress:
            - writing-plans
          override_text: >-
            SDD OVERRIDE: Do NOT invoke `writing-plans` or any other skill after
            brainstorming completes. Your scope is limited to producing `brainstorm.md`.
            Return control to SDD when the brainstorm document is finalized. SDD controls
            the workflow -- the next step is `/sdd-propose`, not `writing-plans`.

    sdd-propose:
      primary:
        - framework: ai_native_kit
          skill: requirement-spec
      manual_message: >-
        ai_native_kit `requirement-spec` not found.
        Proceeding in manual mode -- SDD will guide you through
        the proposal template directly.

    sdd-ff:
      primary:
        - framework: ai_native_kit
          skill: workflow-plan
      manual_message: >-
        ai_native_kit `workflow-plan` not found.
        Proceeding in manual mode -- SDD will generate artifacts
        using templates and spec context directly.

    sdd-plan:
      primary:
        - framework: ai_native_kit
          skill: wbs-all
      fallback:
        - framework: ai_native_kit
          skill: backend-wbs
      manual_message: >-
        ai_native_kit `wbs-all` not found.
        Proceeding in manual mode -- SDD will generate the plan
        using spec context and task list directly.
      transition_suppression:
        - delegate_skill: wbs-all
          suppress: []
          override_text: >-
            SDD OVERRIDE: Do NOT invoke any coding or execution skill after
            wbs-all completes. Your scope is limited to producing `plan.md`.
            Return control to SDD -- the next step is `/sdd-code`, not an
            execution skill.
        - delegate_skill: backend-wbs
          suppress: []
          override_text: >-
            SDD OVERRIDE: Do NOT invoke any coding or execution skill after
            backend-wbs completes. Your scope is limited to producing `plan.md`.
            Return control to SDD -- the next step is `/sdd-code`, not an
            execution skill.

    sdd-code:
      primary:
        - framework: ai_native_kit
          skill: interface-test-case-writer
        - framework: ai_native_kit
          skill: backend-task-executor
        - framework: ai_native_kit
          skill: frontend-task-executor
      manual_message: >-
        ai_native_kit execution skills (`interface-test-case-writer`,
        `backend-task-executor`, `frontend-task-executor`) not found.
        Proceeding with direct TDD coding -- SDD will enforce
        RED-GREEN-REFACTOR cycle directly.
      partial_availability: true
      transition_suppression:
        - delegate_skill: backend-task-executor
          suppress: []
          override_text: >-
            SDD OVERRIDE: Do NOT invoke `version-archive`, `version-push`, or
            any finishing skill after backend-task-executor completes. Your
            scope is limited to executing the tasks in the current batch.
            Return control to SDD -- workspace management and branch finishing
            are handled by `/sdd-ship`.
        - delegate_skill: frontend-task-executor
          suppress: []
          override_text: >-
            SDD OVERRIDE: Do NOT invoke `version-archive`, `version-push`, or
            any finishing skill after frontend-task-executor completes. Your
            scope is limited to executing the tasks in the current batch.
            Return control to SDD -- workspace management and branch finishing
            are handled by `/sdd-ship`.

    sdd-review-spec:
      primary:
        - framework: ai_native_kit
          skill: design-review
      fallback:
        - framework: ai_native_kit
          skill: requirement-check
      manual_message: >-
        ai_native_kit `design-review` not found.
        SDD will review specs directly against schema.yaml requirements.

    sdd-review-code:
      phases:
        phase1:
          description: Spec compliance review (SDD self-logic)
          delegate: self
        phase2:
          primary:
            - framework: ai_native_kit
              skill: consistency-check
            - framework: ai_native_kit
              skill: code-check
          manual_message: >-
            ai_native_kit review skills (`consistency-check`, `code-check`) not found.
            Phase 1 (spec compliance) will run.
            Phase 2 (code quality) skipped -- consider manual code review.

    sdd-verify:
      phases:
        step1:
          primary:
            - framework: ai_native_kit
              skill: interface-test-case-executor
            - framework: ai_native_kit
              skill: functional-verification
        step2:
          primary:
            - framework: ai_native_kit
              skill: test-validation
      manual_message: >-
        ai_native_kit verification skills (`interface-test-case-executor`,
        `functional-verification`, `test-validation`) not found.
        SDD will verify acceptance criteria against test results
        and implementation directly.
      partial_availability: true

    sdd-ship:
      # sync and archive: openspec is the correct primary tool regardless of
      # profile -- ai_native_kit has no spec-sync equivalent.
      # finish: version-archive + version-push handle branch merging and archiving.
      phases:
        sync:
          primary:
            - framework: openspec
              skill: openspec-sync-specs
          inline_fallback: >-
            SDD performs a direct file copy from `.sdd/changes/<name>/specs/`
            to the project spec location.
        archive:
          primary:
            - framework: openspec
              skill: openspec-archive-change
          inline_fallback: >-
            SDD performs a direct directory move to `.sdd/changes/archive/`.
        finish:
          primary:
            - framework: ai_native_kit
              skill: version-archive
          fallback:
            - framework: ai_native_kit
              skill: version-push
          manual_message: >-
            ai_native_kit `version-archive` not found.
            SDD will present git options (merge/PR/preserve/discard)
            and execute directly.
