# SDD Artifact Schema
# Content constraints only -- what each artifact must contain.
# Flow orchestration is handled by SDD skills, not this file.

version: "0.1.0"

# Provenance frontmatter -- required on every generated artifact.
# Enables traceability: which skill produced this file, when, and via which action.
provenance:
  format: yaml_frontmatter
  fields:
    - name: generated_by
      required: true
      description: >
        Structured object identifying the bottom-layer skill that produced
        this artifact. Contains two sub-fields:
          framework: which framework the skill belongs to (openspec, superpowers, ecc, sdd)
          skill: the specific skill name (e.g. "brainstorming", "ff-change")
    - name: sdd_action
      required: true
      description: >
        The SDD action that orchestrated the generation
        (e.g. "sdd-brainstorm", "sdd-propose", "sdd-ff").
    - name: timestamp
      required: true
      description: ISO 8601 timestamp when the artifact was generated.

artifacts:

  brainstorm:
    file: brainstorm.md
    required: false
    predecessor: null
    description: Divergent exploration before committing to an approach
    sections:
      - name: Problem Statement
        required: true
        description: What problem or opportunity triggered this change
      - name: Raw Ideas
        required: true
        description: Unfiltered list of approaches, at least 3
      - name: Constraints
        required: false
        description: Known technical or business constraints
      - name: Open Questions
        required: false
        description: Unresolved questions needing answers before proposing
      - name: Decision
        required: true
        description: Which idea(s) to carry forward and why

  proposal:
    file: proposal.md
    required: true
    predecessor: brainstorm
    description: The formal change proposal -- why and what
    sections:
      - name: Motivation
        required: true
        description: Why this change is needed
      - name: Approach
        required: true
        description: High-level technical approach chosen
      - name: Capabilities
        required: true
        description: >
          List of capabilities this change introduces or modifies.
          Each becomes a spec in specs/<capability>/spec.md.
      - name: Risks
        required: false
        description: Known risks and mitigations
      - name: Out of Scope
        required: false
        description: Explicitly excluded concerns

  spec:
    file: "specs/<capability>/spec.md"
    required: true
    predecessor: proposal
    per_capability: true
    description: Detailed requirement specification for one capability
    sections:
      - name: Requirements
        required: true
        description: Functional requirements as testable statements
      - name: Interfaces
        required: true
        description: Public API surface -- signatures, endpoints, events, CLI
      - name: Behavior
        required: true
        description: >
          Expected behavior including edge cases.
          Prefer given/when/then or input/output examples.
      - name: Dependencies
        required: false
        description: Other capabilities or external systems this depends on
      - name: Acceptance Criteria
        required: true
        description: Concrete, verifiable criteria for done

  design:
    file: design.md
    required: false
    predecessor: spec
    description: Technical design for non-trivial changes
    sections:
      - name: Architecture Overview
        required: true
        description: How capabilities fit together structurally
      - name: Key Decisions
        required: true
        description: >
          Non-obvious design decisions with rationale.
          ADR-lite format: context, decision, consequences.
      - name: Data Model
        required: false
        description: New or modified data structures or schemas
      - name: Error Handling
        required: false
        description: Cross-cutting error strategy
      - name: Migration
        required: false
        description: Migration path if changing existing behavior

  tasks:
    file: tasks.md
    required: true
    predecessor: spec
    description: Implementation task list derived from specs
    sections:
      - name: Task List
        required: true
        description: >
          Ordered, batched list of implementation tasks.
          Format: - [ ] Task title | spec: <capability> | size: S/M/L
      - name: Dependency Order
        required: true
        description: >
          Which tasks must complete before others.
          Expressed as ordered batches (Batch 1, Batch 2...).
      - name: Verification Task
        required: true
        description: Final task(s) for running verification against specs

  plan:
    file: plan.md
    required: false
    predecessor: tasks
    description: Detailed execution plan for the current batch
    sections:
      - name: Current Batch
        required: true
        description: Which batch from tasks.md to execute
      - name: Task Detail
        required: true
        description: >
          For each task in current batch: approach, files to touch,
          test strategy, estimated complexity.
      - name: Session Goals
        required: false
        description: What done looks like for this coding session

  review:
    file: "reviews/<type>-<timestamp>.md"
    required: false
    predecessor: null
    description: Review artifact generated by review actions
    sections:
      - name: Review Type
        required: true
        description: "spec-review | code-review | verification"
      - name: Scope
        required: true
        description: What was reviewed (file list, capability, etc.)
      - name: Findings
        required: true
        description: Issues found, categorized by severity
      - name: Verdict
        required: true
        description: "pass | pass-with-notes | fail"
      - name: Follow-up Actions
        required: false
        description: Concrete next steps if verdict is not pass
